services:
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_NAME: order_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP: kafka:9092
      JWT_SECRET: change-me-in-production-min-32-chars-long

networks:
  default:
    name: spry-network
    external: true
